services:
  app:
    build: .
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_PATH: /data/medi-journal.sqlite
      # ohne diese Zeile schreibt runBackup() nach ./backups relativ zum
      # Container-WORKDIR (/repo/backups) statt ins gemountete Volume -
      # Backups würden Neubauten dann NICHT überleben (widerspräche AK3).
      BACKUP_DIR: /backups
      MASTER_PASSWORD_HASH: ${MASTER_PASSWORD_HASH}
      SESSION_SECRET: ${SESSION_SECRET}
      # M5b: ohne diese drei Variablen crasht der Server beim Start
      # (config.ts required()-Getter) - vor M6 hier vergessen.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      NODE_ENV: production
    volumes:
      - db-data:/data
      - ./backups:/backups
    expose:
      - "3000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  db-data:
  caddy-data:
  caddy-config:
